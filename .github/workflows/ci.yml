name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests (exclude live_llm)
        run: python -m pytest -q --tb=line

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Butler smoke subset (runtime, inbound, ops, memory)
        run: |
          python -m pytest \
            tests/test_runtime.py \
            tests/test_inbound_media.py \
            tests/test_workflow_version.py \
            tests/test_push_queue_dedup.py \
            tests/test_ops_snapshot.py \
            tests/test_failure_tracker.py \
            tests/test_dev_tools_integration.py \
            tests/test_p0_memory_pilot.py \
            -q --tb=line

  live-llm-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Live LLM smoke (manual only)
        env:
          BUTLER_RUN_REAL_API_SMOKE: "1"
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          pip install -e ".[dev]"
          python -m pytest -m live_llm -q --tb=line
