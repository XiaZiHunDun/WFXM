name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 18 * * 1-5"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Python syntax check
        run: python -m py_compile butler/__init__.py && python -c "import ast, pathlib; [ast.parse(p.read_text()) for p in pathlib.Path('butler').rglob('*.py')]"
      - name: Ruff lint
        run: ruff check butler/ --select=E,F,W --ignore=E501,E402 --output-format=concise
      - name: Import smoke test
        run: python -c "from butler.tools.registry import dispatch_tool; from butler.core.agent_loop import AgentLoop; print('imports OK')"

  pytest:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 25
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests (exclude live_llm)
        run: python -m pytest -q --tb=line

  corpus-pr-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Corpus PR gate (gateway / corpus paths)
        env:
          CORPUS_PR_GATE_BASE: origin/${{ github.base_ref }}
        run: ./scripts/corpus-test.sh pr-gate

  corpus-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Gateway catalog drift check
        run: ./scripts/corpus-test.sh drift

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Butler smoke subset (runtime, inbound, ops, memory)
        run: |
          python -m pytest \
            tests/test_runtime.py \
            tests/test_inbound_media.py \
            tests/test_workflow_version.py \
            tests/test_push_queue_dedup.py \
            tests/test_ops_snapshot.py \
            tests/test_failure_tracker.py \
            tests/test_dev_tools_integration.py \
            tests/test_p0_memory_pilot.py \
            -q --tb=line

  corpus-gateway-live:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Gateway L3 live smoke + ops summary
        env:
          BUTLER_RUN_REAL_API_SMOKE: "1"
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          CORPUS_ARCHIVE: "1"
          CORPUS_RUN_ID: nightly-${{ github.run_id }}
        run: |
          ./scripts/corpus-test.sh gateway-live
          python3 scripts/corpus/summarize_runs.py --write docs/plans/corpus/corpus-issue-map-gateway-latest.md

  docs-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Documentation hygiene
        run: bash scripts/docs-lint.sh

  maintenance-full-health:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run full maintenance health report
        run: bash scripts/project-health-report.sh full

      - name: Upload maintenance reports
        uses: actions/upload-artifact@v4
        with:
          name: maintenance-reports-${{ github.run_id }}
          path: logs/maintenance/
          if-no-files-found: warn

  live-llm-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Live LLM smoke (manual only)
        env:
          BUTLER_RUN_REAL_API_SMOKE: "1"
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          pip install -e ".[dev]"
          python -m pytest -m live_llm -q --tb=line
