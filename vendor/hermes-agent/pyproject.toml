[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "hermes-vendored"
version = "2.0.0"
description = "Hermes Agent runtime (vendored) — gateway subprocess fallback only"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
  "openai>=2.21.0,<3",
  "anthropic>=0.39.0,<1",
  "python-dotenv>=1.2.1,<2",
  "fire>=0.7.1,<1",
  "httpx[socks]>=0.28.1,<1",
  "rich>=14.3.3,<15",
  "tenacity>=9.1.4,<10",
  "pyyaml>=6.0.2,<7",
  "ruamel.yaml>=0.18.16,<0.19",
  "requests>=2.33.0,<3",
  "jinja2>=3.1.5,<4",
  "pydantic>=2.12.5,<3",
  "prompt_toolkit>=3.0.52,<4",
  "exa-py>=2.9.0,<3",
  "firecrawl-py>=4.16.0,<5",
  "parallel-web>=0.4.2,<1",
  "fal-client>=0.13.1,<1",
  "croniter>=6.0.0,<7",
  "edge-tts>=7.2.7,<8",
  "PyJWT[crypto]>=2.12.0,<3",
  "tzdata>=2023.3; sys_platform == 'win32'",
  "psutil>=5.9.0,<8",
]

[project.optional-dependencies]
messaging = [
  "python-telegram-bot[webhooks]>=22.6,<23",
  "discord.py[voice]>=2.7.1,<3",
  "aiohttp>=3.13.3,<4",
  "slack-bolt>=1.18.0,<2",
  "slack-sdk>=3.27.0,<4",
  "qrcode>=7.0,<8",
]
mcp = ["mcp>=1.2.0,<2"]
pty = ["ptyprocess>=0.7.0,<1; sys_platform != 'win32'", "pywinpty>=2.0.0,<3; sys_platform == 'win32'"]
honcho = ["honcho-ai>=2.0.1,<3"]
dingtalk = ["dingtalk-stream>=0.20,<1", "alibabacloud-dingtalk>=2.0.0", "qrcode>=7.0,<8"]
feishu = ["lark-oapi>=1.5.3,<2", "qrcode>=7.0,<8"]
gateway-all = [
  "hermes-vendored[messaging]",
  "hermes-vendored[mcp]",
  "hermes-vendored[pty]",
  "hermes-vendored[honcho]",
  "hermes-vendored[dingtalk]",
  "hermes-vendored[feishu]",
]

[project.scripts]
hermes = "hermes_cli.main:main"
hermes-agent = "run_agent:main"

[tool.setuptools]
py-modules = [
  "run_agent", "model_tools", "toolsets", "batch_runner", "trajectory_compressor",
  "toolset_distributions", "cli", "hermes_bootstrap", "hermes_constants", "hermes_state",
  "hermes_time", "hermes_logging", "rl_cli", "utils",
]

[tool.setuptools.package-data]
hermes_cli = ["web_dist/**/*"]
gateway = ["assets/**/*"]

[tool.setuptools.packages.find]
where = ["."]
include = [
  "agent", "agent.*",
  "tools", "tools.*",
  "hermes_cli",
  "gateway", "gateway.*",
  "tui_gateway", "tui_gateway.*",
  "cron",
  "acp_adapter",
  "plugins", "plugins.*",
  "providers", "providers.*",
]
