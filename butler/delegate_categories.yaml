# Delegate category presets (OMO-style; override via ~/.butler/delegate_categories.yaml)
categories:
  quick:
    role: dev
    description: Fast, shallow task — prefer fewer tool iterations
    background: true
    prompt_append: |
      [category:quick] Prefer direct answers; minimize exploration; finish in one pass when possible.
    max_iterations: 12
    deny_tools:
      - delegate_task
      - run_workflow
  deep:
    role: dev
    description: Standard implementation work
    background: true
    prompt_append: |
      [category:deep] Take time to verify changes; use read_file before edits.
    max_iterations: 24
  ultrabrain:
    role: review
    description: Read-heavy analysis; no delegation chain
    background: false
    prompt_append: |
      [category:ultrabrain] Read-only analysis; do not modify files unless explicitly required.
    max_iterations: 20
    allow_tools:
      - read_file
      - list_directory
      - skills_list
      - skill_view
      - session_todos_list
  nexus-sprint:
    role: dev
    description: NEXUS sprint — implement with structured handoff to review
    background: true
    prompt_append: |
      [category:nexus-sprint] 实现后须在上下文中包含 ## Handoff（目标/验收/相关路径）。
    max_iterations: 28
  nexus-micro:
    role: review
    description: NEXUS micro-review — evidence-first, read-only
    background: false
    prompt_append: |
      [category:nexus-micro] 证据优先审查；首行 PASS/FAIL；禁止无依据 PASS。
    max_iterations: 16
    allow_tools:
      - read_file
      - list_directory
      - search_files
      - search_code
      - butler_recall
      - search_project_knowledge
  ui-build:
    role: dev
    description: UI implementation — DESIGN.md tokens, single-component iteration
    background: true
    prompt_append: |
      [category:ui-build] 先 read_file 项目根 DESIGN.md（或 .butler/design/DESIGN.md）。
      按 Iteration Guide 一次只改一个 components.* token；禁止整份 DESIGN 灌入对话。
      遵守 Do's and Don'ts 与 Responsive Behavior；Handoff 须含视觉验收项。
    max_iterations: 28
