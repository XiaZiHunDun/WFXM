version: 1
servers:
  - id: filesystem
    title: Filesystem (reference)
    description: 官方参考 MCP — 只读列目录（需本机已配置 npx）
    trust: trusted
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem", "."]
    env_hints: []
    note: "项目层安装时会尝试自动在 project.yaml tools 追加 mcp_*（BUTLER_MCP_AUTO_PROJECT_TOOLS）"

  - id: github
    title: GitHub MCP
    description: GitHub API 工具（需 PAT）
    trust: trusted
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-github"]
    env_hints:
      - name: GITHUB_PERSONAL_ACCESS_TOKEN
        required: true

  - id: fetch-readonly
    title: HTTP Fetch (read-only)
    description: 只读 HTTP 请求 MCP 模板（opt-in BUTLER_MCP_ENABLED=1；无写工具）
    trust: trusted
    transport: stdio
    command: uvx
    args: ["mcp-server-fetch"]
    env_hints: []
    note: "管家试点只读外联模板；安装：butler mcp add fetch-readonly --workspace <dir>"
