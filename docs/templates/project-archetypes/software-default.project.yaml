# 模板：software-default — 通用软件项目（复制到 projects/<slug>/project.yaml 并改 name）
name: 我的应用
type: software
description: ""
status: active
tools:
  - read_file
  - write_file
  - patch
  - search_files
  - list_directory
  - terminal
  - git_status
  - git_diff
  - git_log
  - skills_list
  - skill_view
dev:
  # VERIFY（/测试、dev_verify）优先使用下列命令；cwd=项目 workspace，PYTHONPATH=仓库根
  test_command: "python3 -m pytest tests/ -q --tb=short"
  lint_command: "python3 -m py_compile butler/main.py"
  build_command: "true"
