# 模板：software-default runtime jobs（复制到 projects/<slug>/runtime/jobs.yaml 并改 project 名）
version: 1
project: 项目名称
defaults:
  timeout_seconds: 600
  notify_wechat: false

jobs:
  - id: test-unit-smoke
    description: 仓库轻量单元测试（pytest 子集，供 /运行 与委派 dev 参考）
    mode: readonly
    enabled: false
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        cd ../..
        export PYTHONPATH="${PYTHONPATH:-.}:."
        python3 -m pytest -q \
          tests/test_project_preflight.py \
          tests/test_project_archetypes.py \
          tests/gateway/test_project_commands.py \
          tests/test_project_lead.py \
          --tb=line
    notify:
      on_success: false
      on_failure: true
      max_summary_chars: 800
