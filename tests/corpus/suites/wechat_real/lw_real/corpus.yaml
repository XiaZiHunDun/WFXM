# WeChat conversation scenarios — general habits + LingWen real dialogue (2026-05-22).
# Design: docs/plans/wechat-real-dialogue-test-scenarios-2026-05.md
# Runner: tests/gateway/test_gateway_dev_conversations.py (corpus: tests/corpus/runners/test_gateway_scripted.py)

meta:
  version: "2026-05-22-r3"
  source_dialogue: lingwen-real-20260522-鹿角象
  default_platform: wechat
  project: 灵文1号
  fixture_paths:
    hello: docs/test_hello.txt
    demo_py: docs/demo_logic.py
  mock_llm: true
  real_tools: true

tiers:
  integration: mock LLM + real handler/tools (CI default)
  live_llm: real MiniMax; BUTLER_RUN_REAL_API_SMOKE=1

# ── 真机对话衍射（LW-REAL，优先）────────────────────────────
lingwen_real_dialogue:
  - id: LW-INTRO-01
    user: "看下你都可以干什么"
    pytest: TestLingwenRealIntro::test_lw_intro_01_capabilities
    expect:
      response_contains: [委派, 记忆]

  - id: LW-INTRO-02
    user: "介绍一下你自己"
    pytest: TestLingwenRealIntro::test_lw_intro_02_lead_identity
    expect:
      response_contains: [厂长, 委派]

  - id: LW-CREATE-01
    user: "那你在灵文一号项目下面尝试新建一个文件，然后往里面写一点代码"
    pytest: TestLingwenRealCreateAndDetail::test_lw_create_01_delegate_hello_file
    llm_script:
      - delegate_task: { role: dev, task: "写 docs/test_hello.txt" }
      - write_file: { path: docs/test_hello.txt }
    expect:
      file_exists: docs/test_hello.txt
      report_success: true

  - id: LW-DETAIL-01
    user: "我要看一下详细信息"
    pytest: TestLingwenRealCreateAndDetail::test_lw_detail_01_phrase_after_create_not_compact_card
    depends_on: LW-CREATE-01
    expect:
      no_llm: true
      not_compact_card: true
      detail_contains: [test_hello]

  - id: LW-CREATE-02
    user: "你帮我创建一个Python文件，然后往里边写一段代码逻辑"
    pytest: TestLingwenRealCreateAndDetail::test_lw_create_02_delegate_python_and_hello_update
    llm_script:
      - write_file: { path: docs/demo_logic.py }
      - write_file: { path: docs/test_hello.txt }
    expect:
      file_exists: [docs/demo_logic.py, docs/test_hello.txt]
      report_changes_min: 2

  - id: LW-DETAIL-02
    user: "/详细"
    pytest: TestLingwenRealCreateAndDetail::test_lw_detail_02_slash_detail_lists_both_files
    depends_on: LW-CREATE-02
    expect:
      no_llm: true
      detail_contains: [demo_logic, test_hello]

  - id: LW-DELETE-01
    user: "好，帮我把你刚才创建的两个文件删掉"
    pytest: TestLingwenRealDelete::test_lw_delete_01_removes_both_files_in_one_delegate
    llm_script:
      - delete_file: docs/test_hello.txt
      - delete_file: docs/demo_logic.py
    expect:
      file_missing: [docs/test_hello.txt, docs/demo_logic.py]
      report_changes_deleted_min: 2

  - id: LW-DETAIL-03
    user: "/详细"
    pytest: TestLingwenRealDelete::test_lw_detail_03_after_delete_not_stale_create_report
    depends_on: LW-DELETE-01
    expect:
      task_preview_contains: 删除
      detail_excludes: ["文件已创建完成"]
      stale_stats_excludes: "5 轮 | 4 工具"

  - id: LW-DELETE-FAIL
    user: "好，帮我把你刚才创建的两个文件删掉"
    pytest: TestLingwenRealDelete::test_lw_delete_fail_files_remain_and_headline_failed
    expect:
      report_success: false
      files_remain: true

  - id: LW-REAL-GOLDEN
    user: "T3→T9 整链"
    pytest: TestLingwenRealGoldenPath::test_lw_real_golden_path_full_dialogue
    steps: [LW-CREATE-01, LW-DETAIL-01, LW-DETAIL-02, LW-CREATE-02, LW-DELETE-01, LW-DETAIL-03]

# ── 通用习惯场景（DEV-*，补全集）────────────────────────────
general_dev_habits:
  - id: DEV-B02
    name: 单文件删除 + 详细信息
    pytest: TestDevDailyScenarios::test_b02_delegate_delete_success_and_detail_task_preview

  - id: DEV-B03
    name: 删除失败 headline
    pytest: TestDevDailyScenarios::test_b03_delegate_delete_failure_wechat_and_report

  - id: DEV-C02
    name: 详细别名
    pytest: TestDevDailyScenarios::test_c02_detail_aliases_skip_llm

  - id: DEV-C05
    name: 连续委派报告不串台
    pytest: TestDevDailyScenarios::test_c05_sequential_delegate_detail_shows_latest_task

  - id: DEV-B05
    name: Lead 工具边界
    pytest: TestDevLeadToolBoundary::test_lingwen_lead_allowlist_matches_daily_expectation

# ── 仍由 acceptance 覆盖 ────────────────────────────────────
delegated_to_acceptance:
  - id: A-03
    implements: test_gateway_acceptance.TestWechatSmokeDelegate::test_read_readme_without_delegate
  - id: F-01
    implements: test_gateway_acceptance.TestWechatSmokeWorkflow

live_smoke_candidates:
  - id: LIVE-LW-DETAIL-01
    maps_to: LW-DETAIL-01
    user: "我要看一下详细信息"
  - id: LIVE-LW-DELETE-01
    maps_to: LW-DELETE-01
    user: "好，帮我把你刚才创建的两个文件删掉"

# ── 话术目录（CAT/SMK/DEV，见 utterance_catalog.yaml）──────────
utterance_catalog_file: utterance_catalog.yaml
utterance_catalog_runner: tests/corpus/runners/test_gateway_utterance_catalog.py
