  - id: DA-04
    dimension: optimization
    title: 冒泡排序提前终止
    user: |
      下面的冒泡排序已经能工作，怎样优化让它提前终止？
      ```java
      void bubbleSort(int[] arr) {
          int n = arr.length;
          for (int i = 0; i < n-1; i++)
              for (int j = 0; j < n-i-1; j++)
                  if (arr[j] > arr[j+1]) {
                      int temp = arr[j];
                      arr[j] = arr[j+1];
                      arr[j+1] = temp;
                  }
      }
      ```
    must_contain:
      - swapped
    must_contain_any:
      - boolean
      - flag
    must_not_contain: []

