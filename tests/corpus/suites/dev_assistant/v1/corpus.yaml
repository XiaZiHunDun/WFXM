cases:
  - id: DA-01
    dimension: code_generation
    title: Python 读取 sales.csv 计算总销售额
    user: |
      用 Python 写一个函数，读取 `sales.csv` 文件，计算总销售额并打印。假设文件有 `amount` 列。
    must_contain:
      - csv
      - amount
    must_contain_any:
      - total
      - 总销售
      - 销售额
    must_not_contain: []
    butler_lead_expect:
      should_delegate: true
      delegate_role: dev

