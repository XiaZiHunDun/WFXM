[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "butler-system"
version = "0.1.0"
description = "AI Butler System - 多项目 AI 协助系统"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.40",
    "openai>=1.50",
    "httpx>=0.27",
    "rich>=13.0",
    "prompt-toolkit>=3.0",
    "pyyaml>=6.0",
    "pydantic>=2.0",
    "python-dotenv>=1.0",
    "aiosqlite>=0.20",
]

[project.optional-dependencies]
wechat = ["aiohttp>=3.9", "certifi", "qrcode>=7.0"]
all = ["butler-system[wechat]"]

[project.scripts]
butler = "butler.main:main"

[tool.hatch.build.targets.wheel]
packages = ["butler"]
