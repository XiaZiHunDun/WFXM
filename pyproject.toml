[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "butler-system"
version = "2.0.0"
description = "Butler AI 管家系统 v4 - 自建 Agent Loop 的多项目 AI 协助平台"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
  "openai>=2.21.0,<3",
  "anthropic>=0.39.0,<1",
  "python-dotenv>=1.2.1,<2",
  "fire>=0.7.1,<1",
  "httpx[socks]>=0.28.1,<1",
  "rich>=14.3.3,<15",
  "tenacity>=9.1.4,<10",
  "pyyaml>=6.0.2,<7",
  "ruamel.yaml>=0.18.16,<0.19",
  "requests>=2.33.0,<3",
  "jinja2>=3.1.5,<4",
  "pydantic>=2.12.5,<3",
  "prompt_toolkit>=3.0.52,<4",
  "exa-py>=2.9.0,<3",
  "firecrawl-py>=4.16.0,<5",
  "parallel-web>=0.4.2,<1",
  "fal-client>=0.13.1,<1",
  "croniter>=6.0.0,<7",
  "edge-tts>=7.2.7,<8",
  "PyJWT[crypto]>=2.12.0,<3",
  "tzdata>=2023.3; sys_platform == 'win32'",
  "psutil>=5.9.0,<8",
  "jieba>=0.42",
  "aiosqlite>=0.20",
]

[project.optional-dependencies]
# Hermes subprocess gateway (telegram / slack / …). WeChat stays Butler-native.
hermes-gateway = ["hermes-vendored[gateway-all] @ file:vendor/hermes-agent"]
messaging = ["python-telegram-bot[webhooks]>=22.6,<23", "discord.py[voice]>=2.7.1,<3", "aiohttp>=3.13.3,<4", "slack-bolt>=1.18.0,<2", "slack-sdk>=3.27.0,<4", "qrcode>=7.0,<8"]
wechat = ["aiohttp>=3.9", "certifi", "qrcode>=7.0"]
dev = [
  "debugpy>=1.8.0,<2",
  "pytest>=9.0.2,<10",
  "pytest-asyncio>=1.3.0,<2",
  "ruff",
  "hermes-vendored[gateway-all] @ file:vendor/hermes-agent",
]
matrix = ["mautrix[encryption]>=0.20,<1", "Markdown>=3.6,<4", "aiosqlite>=0.20", "asyncpg>=0.29", "aiohttp-socks>=0.10,<1"]
cli = ["simple-term-menu>=1.0,<2"]
voice = ["faster-whisper>=1.0.0,<2", "sounddevice>=0.4.6,<1", "numpy>=1.24.0,<3"]
pty = ["ptyprocess>=0.7.0,<1; sys_platform != 'win32'", "pywinpty>=2.0.0,<3; sys_platform == 'win32'"]
honcho = ["honcho-ai>=2.0.1,<3"]
mcp = ["mcp>=1.2.0,<2"]
homeassistant = ["aiohttp>=3.9.0,<4"]
sms = ["aiohttp>=3.9.0,<4"]
dingtalk = ["dingtalk-stream>=0.20,<1", "alibabacloud-dingtalk>=2.0.0", "qrcode>=7.0,<8"]
feishu = ["lark-oapi>=1.5.3,<2", "qrcode>=7.0,<8"]
bedrock = ["boto3>=1.35.0,<2"]
mistral = ["mistralai>=2.3.0,<3"]
web = ["fastapi>=0.104.0,<1", "uvicorn[standard]>=0.24.0,<1"]
all = [
  "butler-system[messaging]",
  "butler-system[wechat]",
  "butler-system[hermes-gateway]",
  "butler-system[cli]",
  "butler-system[dev]",
  "butler-system[pty]",
  "butler-system[honcho]",
  "butler-system[mcp]",
  "butler-system[homeassistant]",
  "butler-system[sms]",
  "butler-system[dingtalk]",
  "butler-system[feishu]",
  "butler-system[web]",
]

[project.scripts]
butler = "butler.main:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["butler", "butler.*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
norecursedirs = ["archive", ".git", "node_modules", "venv", "vendor"]
markers = [
    "unit: L1 unit tests (fast, no I/O)",
    "module_test: L2 module tests (mocked I/O)",
    "integration: L3 integration tests (cross-module)",
    "e2e: L4 end-to-end tests (full pipeline)",
    "slow: tests taking > 5s",
    "live_llm: requires real LLM API key (skip in CI)",
    "legacy_hermes: v3 / Hermes AIAgent integration (tests/archive only)",
]
addopts = "-m 'not live_llm'"
