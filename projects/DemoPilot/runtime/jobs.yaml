# 演示试点 · runtime（多项目 / 测试冒烟）
version: 1
project: 演示试点
defaults:
  timeout_seconds: 600
  notify_wechat: false

jobs:
  - id: pilot-heartbeat
    description: 试点心跳（只读 echo，用于 /定时 与 timer 冒烟）
    schedule: "0 12 * * *"
    mode: readonly
    enabled: true
    command:
      - bash
      - -c
      - echo "DemoPilot heartbeat $(date -Iseconds)"
    notify:
      on_success: false
      on_failure: false

  - id: test-unit-smoke
    description: WFXM 仓库轻量 pytest（项目层接入回归子集）
    mode: readonly
    enabled: false
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        cd ../..
        export PYTHONPATH="${PYTHONPATH:-.}:."
        python3 -m pytest -q \
          tests/test_project_preflight.py \
          tests/test_project_archetypes.py \
          tests/gateway/test_project_commands.py \
          tests/test_project_lead.py \
          tests/test_owner_gate.py \
          --tb=line
    notify:
      on_success: false
      on_failure: true
      max_summary_chars: 800
