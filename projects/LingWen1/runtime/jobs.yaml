# 灵文1号 · Butler Runtime 任务注册表（阶段 3）
# 执行：butler runtime run <id> --project 灵文1号
# 定时：scripts/systemd/butler-runtime-lingwen.timer（实施后）或 crontab

version: 1
project: 灵文1号
defaults:
  timeout_seconds: 900
  notify_wechat: true

jobs:
  - id: consistency-weekly
    description: 小说工厂一致性检查（生成报告，不改盘）
    schedule: "0 9 * * 1"
    mode: readonly
    enabled: true
    command:
      - bash
      - novel-factory/tools/consistency/run_consistency_check.sh
    notify:
      on_success: true
      on_failure: true
      max_summary_chars: 1200

  # 离线记忆卫生：修剪过期 conversation 经验（OC-P3；默认关闭，启用后每周日 03:00）
  - id: memory-offline-weekly
    description: 修剪 ~/.butler 下过期的 conversation 经验行（只读，不改项目盘）
    schedule: "0 3 * * 0"
    mode: readonly
    enabled: false
    handler: builtin:memory_offline_consolidate
    notify:
      on_success: true
      on_failure: true
      max_summary_chars: 600

  - id: factory-status-daily
    description: workflow_state.json 日报摘要
    schedule: "0 8 * * *"
    mode: readonly
    enabled: true
    handler: builtin:workflow_state_digest
    notify:
      on_success: true
      on_failure: true
      max_summary_chars: 800

  # D3-6 经验挖掘：只读扫描→定理审查→待审队列（默认不自动入库；见 BUTLER_EXPERIENCE_MINING_AUTO_INGEST）
  - id: experience-mining-weekly
    description: 经验挖掘周报（候选入 pending，Owner 用 /经验挖掘 或 approve 入库）
    schedule: "0 4 * * 0"
    mode: readonly
    enabled: true
    handler: builtin:experience_mining_weekly
    notify:
      on_success: true
      on_failure: true
      max_summary_chars: 800

  # 只读预检：run_publish.sh preflight（不 archive/merge）；改盘仍须 /批准运行 + 单独 mutating job
  - id: publish-preflight
    description: 发布前只读预检（workflow 版本 + 目录检查，不写入）
    mode: readonly
    enabled: true
    schedule: "0 7 * * 0"
    command:
      - bash
      - novel-factory/tools/publish/run_publish.sh
      - preflight
    notify:
      on_success: true
      on_failure: true
      max_summary_chars: 1000

  # 改盘：须 /批准运行 + enabled: true；默认关闭
  - id: publish-archive
    description: 归档当前 workflow 版本到 08_已发布（mutating）
    mode: mutating
    enabled: false
    approval:
      required: true
      expires_hours: 48
    command:
      - bash
      - novel-factory/tools/publish/run_publish.sh
      - archive
      - "{workflow_version}"
    notify:
      on_success: true
      on_failure: true
      max_summary_chars: 800

  - id: publish-merge
    description: 合并正文为单文件（mutating，写入 07_汇总仓库）
    mode: mutating
    enabled: false
    approval:
      required: true
      expires_hours: 48
    command:
      - bash
      - novel-factory/tools/publish/run_publish.sh
      - merge
      - "{workflow_version}"
    notify:
      on_success: true
      on_failure: true
      max_summary_chars: 800
