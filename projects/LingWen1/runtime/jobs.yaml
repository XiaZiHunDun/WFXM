# 灵文1号 · Butler Runtime 任务注册表（阶段 3）
# 执行：butler runtime run <id> --project 灵文1号
# 定时：scripts/systemd/butler-runtime-lingwen.timer（实施后）或 crontab

version: 1
project: 灵文1号
defaults:
  timeout_seconds: 900
  notify_wechat: true

jobs:
  - id: consistency-weekly
    description: 小说工厂一致性检查（生成报告，不改盘）
    schedule: "0 9 * * 1"
    mode: readonly
    enabled: true
    command:
      - bash
      - novel-factory/tools/consistency/run_consistency_check.sh
    notify:
      on_success: true
      on_failure: true
      max_summary_chars: 1200

  - id: factory-status-daily
    description: workflow_state.json 日报摘要
    schedule: "0 8 * * *"
    mode: readonly
    enabled: true
    handler: builtin:workflow_state_digest
    notify:
      on_success: true
      on_failure: true
      max_summary_chars: 800

  # 只读预检：run_publish.sh preflight（不 archive/merge）；改盘仍须 /批准运行 + 单独 mutating job
  - id: publish-preflight
    description: 发布前只读预检（workflow 版本 + 目录检查，不写入）
    mode: readonly
    enabled: true
    schedule: "0 7 * * 0"
    command:
      - bash
      - novel-factory/tools/publish/run_publish.sh
      - preflight
    notify:
      on_success: true
      on_failure: true
      max_summary_chars: 1000

  # 改盘：须 /批准运行 + enabled: true；默认关闭
  - id: publish-archive
    description: 归档当前 workflow 版本到 08_已发布（mutating）
    mode: mutating
    enabled: false
    approval:
      required: true
      expires_hours: 48
    command:
      - bash
      - novel-factory/tools/publish/run_publish.sh
      - archive
      - v3.0
    notify:
      on_success: true
      on_failure: true
      max_summary_chars: 800

  - id: publish-merge
    description: 合并正文为单文件（mutating，写入 07_汇总仓库）
    mode: mutating
    enabled: false
    approval:
      required: true
      expires_hours: 48
    command:
      - bash
      - novel-factory/tools/publish/run_publish.sh
      - merge
      - v3.0
    notify:
      on_success: true
      on_failure: true
      max_summary_chars: 800
