## 都市背景要素
城市设定:
  - 城市类型：一线/二线/省会/县城
  - 行业背景：互联网/金融/制造/服务
  - 社会阶层：精英/中产/底层

## 职场体系
职业层级:
  - 基层：执行层，被管理者
  - 中层：部门负责人
  - 高层：总监/VP/CEO
  - 特殊：专家/顾问

## 职场规则
核心规则:
  - 能力为基：专业能力是立足之本
  - 关系为网：人际网络决定资源获取
  - 利益交换：职场本质是价值交换
  - 站队博弈：派系是职场常态

## 商战要素
竞争类型:
  - 产品竞争：市场份额争夺
  - 人才竞争：核心人才争夺
  - 资本竞争：融资/并购/上市
  - 信息竞争：情报/商业间谍

## 禁忌设定
- 不写脱离现实的悬浮情节
- 不写无代价逆袭（职场讲求积累）
- 不写脸谱化人物（职场人复杂多面）