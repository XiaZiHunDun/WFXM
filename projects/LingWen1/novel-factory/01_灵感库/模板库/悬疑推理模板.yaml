适用类型: 悬疑推理、惊悚犯罪
版本: 1.0
更新日期: 2026-05-14

## 悬疑结构要素
核心悬念设计:
  - 表层悬念：表面事件/现象
  - 中层悬念：隐藏真相
  - 深层悬念：动机/背景

## 推理要素
推理类型:
  - 逻辑推理：演绎/归纳
  - 心理推理：行为分析/微表情
  - 科学推理：法医/鉴证/技术
  - 社会推理：动机/利益分析

## 线索设计
线索类型:
  - 显性线索：直接可见
  - 隐性线索：需深入挖掘
  - 误导线索：故意引导错误方向
  - 关键线索：核心真相

## 叙事结构
悬念布局:
  - 开篇悬念：吸引读者
  - 递进悬念：逐层深入
  - 高潮悬念：真相揭露
  - 余韵悬念：留白/反思

## 禁忌设定
- 不写漏洞BUG（推理需严密）
- 不写强行反转（反转需有伏笔）
- 不写工具人角色（每个角色有动机）
- 不写无意义悬疑（悬念服务剧情）