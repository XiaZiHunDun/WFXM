## 废土世界观要素
背景设定:
  - 天灾类型：核战/外星入侵/气候灾难/资源枯竭
  - 时间跨度：灾变后多少年
  - 生存状态：资源匮乏程度、聚落分布

## 生存资源体系
稀缺资源:
  - 清洁水源：决定聚落存亡
  - 食物来源：可种植/可狩猎/可合成
  - 能源：电力/燃料/可再生
  - 医疗：药品/技术/变异疾病

## 变异/异能设定
变异类型:
  - 生物变异：动植物变异，出现异兽
  - 人类变异：觉醒异能/身体强化
  - 环境变异：土地毒化/气候异常

## 势力格局
势力类型:
  - 聚落型：小型幸存者聚落
  - 帮派型：资源争夺组织
  - 国家型：重建秩序的政权
  - 特殊型：掌握核心技术的组织

## 废土生存法则
核心法则:
  - 实力为尊：拳头决定话语权
  - 资源至上：生存资源是核心
  - 技术为王：掌握技术者稀缺
  - 信息不对称：情报决定生死

## 禁忌设定
- 不写资源无限（匮乏是废土核心）
- 不写秩序完好（混乱是常态）
- 不写主角金手指无代价（废土讲求等价交换）