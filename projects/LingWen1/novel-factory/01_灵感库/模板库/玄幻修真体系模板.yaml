# 使用方式：引用后根据项目特点调整

template_id: xianxia_system_v1
模板名称: 玄幻修真体系
适用类型: 玄幻修真、仙侠
版本: 1.0
更新日期: 2026-05-14

## 境界体系（可调整）
境界划分:
  - 粒子境：初入修真，感知宇宙粒子
  - 星火境：粒子凝聚成星火，可外放
  - 脉冲境：星火脉冲，攻击力提升
  - 裂变境：粒子裂变，力量剧增
  - 黑洞境：引力坍缩，可吞噬一切
  - 创世境：开创空间，法则具象化
  - 永恒境：超脱时间，空间永存

## 修炼要素
修炼本质: 对宇宙粒子的操控与融合
关键要素:
  - 资质：决定修炼速度上限
  - 机缘：决定突破概率
  - 心境：决定能否驾驭力量
  - 代价：每境界突破需付出代价（寿命/记忆/情感等）

## 力量来源
力量来源类型:
  - 天赋型：天生对某类粒子亲和
  - 后天型：通过丹药/功法提升
  - 传承型：师徒/血脉传递
  - 融合型：多来源混合

## 升级路线设计要点
- 每境界需有明确突破条件
- 境界差距要有清晰的实力体现
- 避免无脑升级，需要机缘+努力+代价
- 境界名称要有辨识度

## 禁忌设定
- 不写力量体系崩坏（后期境界压制前期无逻辑）
- 不写无代价升级（机缘+努力+代价缺一不可）
- 不写境界天花板过低（需预留足够成长空间）