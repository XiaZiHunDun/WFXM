project_id: starfall_epoch_001
小说名称: 《星陨纪元》
副标题: （留空或自拟）
类型:
  primary: 玄幻修真
  secondary: 废土生存、星际联盟
  tone: 冷峻写实，带废土朋克风
核心主题: "守护的意义，不是征服，而是让所有生命都能在宇宙中安心存在"
世界观设定概要:
  - 废土设定：暗域入侵后的末世地球，资源匮乏，变异兽横行
  - 修真体系：粒子境→星火境→脉冲境→裂变境→黑洞境→创世境→永恒境
  - 核心势力：星辰会（恐惧派）、玄机阁、万剑宗、星际修真联盟
核心主角人设梗概:
  林夜：废土少年，父母死于暗域追杀，性格冷峻内敛，复仇心切但逐渐转向守护
  苏琳：预言能力者，被星辰会追杀，性格温柔坚定，成为林夜的锚点
核心冲突主线:
  - 林夜的复仇vs守护的抉择
  - 光明与黑暗的融合
  - 暗皇的"值得吗"之问
目标受众:
  age_range: 18-35
  appeal: 智斗、反转、成长型主角、废土朋克
叙事结构:
  volumes: 3
  chapters_per_volume: 120
  words_per_chapter: 3000
  pov: 第三人称有限（林夜为主）
风格指南:
  language_style: 现代简洁，带古风韵味
  pacing: 快节奏，情节紧凑
  dialogue_ratio: 30%
  sensory_focus: 心理+环境描写并重
  禁忌设定: 不写降智反派、不注水、不圣母
  核心卖点:
    - "主角智商全程在线"
    - "环环相扣的朝堂博弈+废土生存"
    - "光明与黑暗的辩证思考"
开篇方向: 从林夜父母之死开场，废土生存的压迫感
结局走向预设: 开放式——林夜苏琳化为星光守护宇宙
参考作品:
  - 《遮天》——升级体系+废土设定
  - 《全职高手》——团队协作+成长线
  - 《星际穿越》——宇宙尺度+父女羁绊
特殊要求:
  - 主角唯一性：林夜+苏琳贯穿全程
  - 反派演化：暗皇→虚空之王→虚无之主（同一本源的不同表现）
output_version: 1.0