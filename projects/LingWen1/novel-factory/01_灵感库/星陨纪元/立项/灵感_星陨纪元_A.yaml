project_id: starfall_epoch_001
小说名称: 《星陨纪元》
副标题: 废土星火
类型:
  primary: 玄幻修真
  secondary: 废土生存、星际联盟
  tone: 冷峻写实，带废土朋克风
核心主题: "守护的意义，不是征服，而是让所有生命都能在宇宙中安心存在"
世界观设定概要:
  - 废土设定：暗域入侵后的末世地球，资源匮乏，变异兽横行，人类的聚落如同黑暗海洋中的零星灯火
  - 修真体系：粒子境→星火境→脉冲境→裂变境→黑洞境→创世境→永恒境，修炼本质是对宇宙粒子的操控与融合
  - 核心势力：星辰会（恐惧派，主张彻底清除暗域残留）、玄机阁（情报与算计）、万剑宗（剑修传承）、星际修真联盟（后期成立）
  - 暗域：入侵的现实空间，充斥着变异能量与暗兽，被视为"黑暗"的具象化
核心主角人设梗概:
  林夜：废土少年，父母死于暗域追杀，性格冷峻内敛，复仇心切但逐渐转向守护。成长过程克制，不圣母，决策果断
  苏琳：预言能力者，被星辰会视为异端追杀，性格温柔坚定，用预言之眼为林夜照见可能性，成为他的锚点而非导师
  铁蛋：废土机械师，实用主义者，话少可靠，是团队的技术核心
  莫言：万剑宗剑修，沉默寡言，剑道天赋极高，背负宗门覆灭之仇
核心冲突主线:
  - 复仇vs守护：林夜在仇恨中挣扎，最终选择"为值得保护的人而活"而非"为复仇而死"
  - 光明与黑暗的融合：暗域并非纯粹的恶，而是宇宙的另一面，林夜需要找到共存之道
  - 暗皇之问："值得吗？"——这是贯穿全文的哲学叩问，结局给出开放式回答
  - 星辰会的执念：内部阻力，恐惧派将异见者视为必须清除的威胁
目标受众:
  age_range: 18-35
  appeal: 智斗、反转、成长型主角、废土朋克、星际修真世界观
叙事结构:
  volumes: 3
  chapters_per_volume: 120
  words_per_chapter: 3000
  pov: 第三人称有限（林夜为主），重大章节切换视角展现对手与盟友
  结构特点: 每卷结尾留悬念，三卷分别对应"生存→觉醒→永恒"
风格指南:
  language_style: 现代简洁，带古风韵味，废土朋克语境下融入修真术语
  pacing: 快节奏，情节紧凑，不注水，每章有推进
  dialogue_ratio: 30%
  sensory_focus: 心理描写（内心挣扎、抉择之痛）与环境描写（废土荒凉、废墟压迫感）并重
  禁忌设定: 不写降智反派、不注水、不圣母主角、无脑升级
  核心卖点:
    - "主角智商全程在线，决策有逻辑支撑"
    - "环环相扣的势力博弈与废土生存"
    - "光明与黑暗的辩证思考，不是非黑即白"
    - "情感克制而深沉，爱意通过行动而非言语表达"
开篇方向: 从林夜父母之死开场，暗域追杀者破门而入，父亲倒下前将粒子境修炼法门刻入林夜掌心，母亲以命换他逃生的30秒。废土的压迫感与生存的艰辛在逃亡中铺展。
结局走向预设: 开放式——林夜与苏琳化为守护星光，联盟残部继续在凡人世界传承意志，暗皇的问题没有标准答案，留给读者思考
参考作品:
  - 《遮天》——升级体系+废土设定
  - 《全职高手》——团队协作+成长线
  - 《星际穿越》——宇宙尺度+父女羁绊+哲学叩问
特殊要求:
  - 主角唯一性：林夜与苏琳贯穿全程，是所有核心事件的中心
  - 反派演化：暗皇→虚空之王→虚无之主（同一宇宙本源的不同面向，非脸谱化敌人）
  - 废土感：变异兽、机械废墟、匮乏资源、势力林立，修真者的能力在废土中反而成为生存优势
  - 成长逻辑：每一步提升都有代价与牺牲，机缘与努力并存
