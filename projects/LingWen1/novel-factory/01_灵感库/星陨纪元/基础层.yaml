# 《星陨纪元》基础层
# 作家部门创作核心参照
# 版本: v1.0
# 主编: 灵感B（轮值第二顺位）

project_id: starfall_epoch_001
小说名称: 《星陨纪元》
副标题: 废土星火
类型:
  primary: 玄幻修真
  secondary: 废土生存、星际联盟
  tone: 冷峻写实，带废土朋克风
核心主题: "守护的意义，不是征服，而是让所有生命都能在宇宙中安心存在"
核心主角人设:
  - 姓名: 林夜
    特征: 废土少年，父母死于暗域追杀，性格冷峻内敛，复仇心切但逐渐转向守护
  - 姓名: 苏琳
    特征: 预言能力者，被星辰会追杀，性格温柔坚定，成为林夜的锚点
  - 姓名: 铁蛋
    特征: 废土机械师，实用主义者，话少可靠，团队技术核心
  - 姓名: 莫言
    特征: 万剑宗剑修，沉默寡言，剑道天赋极高，背负宗门覆灭之仇
核心冲突主线:
  - 复仇vs守护：林夜在仇恨中挣扎，最终选择"为值得保护的人而活"
  - 光明与黑暗的融合：暗域并非纯粹的恶，林夜需找到共存之道
  - 暗皇之问："值得吗？"——贯穿全文的哲学叩问
目标受众:
  age_range: 18-35
  appeal: 智斗、反转、成长型主角、废土朋克、星际修真世界观
风格指南:
  language_style: 现代简洁，带古风韵味，废土朋克语境下融入修真术语
  pacing: 快节奏，情节紧凑，不注水，每章有推进
  dialogue_ratio: 30%
  sensory_focus: 心理描写与环境描写并重
  禁忌设定: 不写降智反派、不注水、不圣母主角、无脑升级
  核心卖点:
    - "主角智商全程在线，决策有逻辑支撑"
    - "环环相扣的势力博弈与废土生存"
    - "光明与黑暗的辩证思考"
    - "情感克制而深沉，爱意通过行动而非言语表达"
开篇方向: 从林夜父母之死开场，暗域追杀者破门而入，父亲倒下前将粒子境修炼法门刻入林夜掌心，母亲以命换他逃生的30秒
output_version: v1.0
