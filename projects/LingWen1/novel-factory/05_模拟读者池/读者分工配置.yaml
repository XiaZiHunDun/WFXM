## 并行分配策略

当分配批量阅读任务时，按以下策略分配：

### 分配原则

1. **专长匹配**：优先分配给擅长该题材的读者
2. **风格互补**：避免同风格读者重复分配同一章节
3. **负载均衡**：每批任务尽量均匀分配

### 分配示例

```
任务：阅读ch001-ch010（都市言情+职场）
分配：
  ch001-ch002 → 读者A（都市、脑洞）
  ch003-ch004 → 读者B（职场、商战）
  ch005-ch006 → 读者P（情感细腻）
  ch007-ch008 → 读者K（校园、新人）
  ch009-ch010 → 读者Q（青春共鸣）
```