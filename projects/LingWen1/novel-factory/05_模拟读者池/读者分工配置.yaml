## 评论风格分类

| 风格标签 | 读者 | 特点 |
|---------|------|------|
| 直率犀利 | A, K, Q | 明确说好看/难看，直接给反馈 |
| 温和专业 | B, H, N | 结构化分析，理性评价 |
| 学术严谨 | C, G, M | 细节控，注重质量 |
| 市场导向 | J, O, T | 注重流量、口碑、传播 |
| 逻辑严密 | D, I, L | 系统化分析，技术/商业视角 |
| 情感细腻 | E, F, P | 注重情感共鸣，人物塑造 |

