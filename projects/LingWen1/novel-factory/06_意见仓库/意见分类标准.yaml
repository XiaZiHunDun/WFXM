## 优先级调整规则

### 升级条件

1. **发现实质影响**：P2问题发现更严重影响 → 升级为P1
2. **读者集中反馈**：P2/P3问题收到多位读者反馈 → 升级为P1
3. **修复引入问题**：修复过程产生新问题 → 继承原优先级
4. **跨章节扩散**：单章节问题扩散到多章节 → 升级

### 降级条件

1. **误判纠正**：审核员重新评估后 → 降至合理级别
2. **问题已自愈**：后续章节自然解决 → 降为P3记录
3. **重复意见**：多审核员提同一P1问题 → 合并为1条P1

---

## 合并规则

### 合并判定

| 条件 | 操作 |
|------|------|
| 同章节+同问题类型 | 合并为1条，标注来源数量 |
| 同章节+同优先级+不同审核员 | 合并为1条，标注多人反馈 |
| 跨章节同问题 | 分配给同一作家处理 |

### 合并后优先级

- 多条P2合并 → 保留P2（不变）
- P2+P3合并 → 取较高，即P2
- 多条P1合并 → 保留P1（不变）
- P0不能与其他合并

---

