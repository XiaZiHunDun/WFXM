## 各部门意见处理时效

### 审核部门

| 审核类型 | 处理时效 | 说明 |
|---------|---------|------|
| 全文大纲审核 | 4小时 | 全局性问题，影响所有卷 |
| 卷大纲审核 | 2小时 | 单卷问题，需快速响应 |
| 阶段大纲审核 | 2小时 | 20-40章阶段问题 |
| 正文审核 | 1小时 | 10章批次，高吞吐量 |

### 作家部门

| 修改类型 | 处理时效 | 说明 |
|---------|---------|------|
| P0修改 | 1小时 | 紧急修复 |
| P1修改 | 4小时 | 当批次完成 |
| P2修改 | 24小时 | 下一批次完成 |
| P3修改 | 72小时 | 记录在案 |

### 读者部门

| 评论类型 | 处理时效 | 说明 |
|---------|---------|------|
| 紧急反馈 | 4小时 | 涉及阅读障碍 |
| 一般反馈 | 24小时 | 汇总后分发 |
| 常规评论 | 72小时 | 批量处理 |

### 汇总部门

| 汇总类型 | 处理时效 | 说明 |
|---------|---------|------|
| 阶段汇总 | 2小时 | 20-40章汇总 |
| 卷汇总 | 4小时 | 单卷整合 |
| 全文汇总 | 8小时 | 全局性整合 |

