## 问题类型分类

### 技术类问题

| 问题类型 | 优先级基准 | 判定标准 |
|---------|-----------|---------|
| 逻辑矛盾 | P0-P1 | 情节违背设定 |
| 设定冲突 | P0-P1 | 世界观不一致 |
| 人设崩塌 | P0-P1 | 角色行为异常 |
| 漏洞发现 | P1-P2 | 情节不连贯 |

### 叙事类问题

| 问题类型 | 优先级基准 | 判定标准 |
|---------|-----------|---------|
| 节奏拖沓 | P1-P2 | 每章超限200字 |
| 场景跳跃 | P1-P2 | 缺少过渡描写 |
| 衔接断裂 | P1-P2 | 章节不连贯 |
| 情感铺垫不足 | P2-P3 | 读者反馈为主 |

### 文笔类问题

| 问题类型 | 优先级基准 | 判定标准 |
|---------|-----------|---------|
| 语法错误 | P1 | 明显错误 |
| 用词不当 | P2 | 影响理解 |
| 重复描写 | P2-P3 | 风格问题 |
| 标点问题 | P3 | 轻微优化 |

### 市场类问题

| 问题类型 | 优先级基准 | 判定标准 |
|---------|-----------|---------|
| 红线问题 | P0 | 涉及安全 |
| 读者差评 | P1 | 集中反馈 |
| 风格不统一 | P2 | 影响阅读 |
| 创新不足 | P3 | 优化方向 |

