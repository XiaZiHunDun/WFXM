# 意见分类标准 v1.0

## 优先级定义

### P0 - 紧急（硬伤/死锁）

**定义标准**：
- 逻辑硬伤：情节发展违背已有设定
- 设定冲突：力量体系、世界观出现矛盾
- 人设崩塌：角色行为与其背景/性格严重不符
- 安全问题：涉及政治/色情/暴力红线

**处理时效**：1小时内处理

**示例**：
```yaml
- 优先级: P0
  类型: 逻辑硬伤
  描述: ch051中星月性别前后不一
  影响: 读者困惑，无法代入

- 优先级: P0
  类型: 设定冲突
  描述: 境界体系在ch100与ch105描述不一致
  影响: 世界观崩塌

- 优先级: P0
  类型: 人设崩塌
  描述: ch080中林夜行为与其孤儿背景矛盾
  影响: 角色失去可信度
```

---

### P1 - 高优（影响阅读/市场）

**定义标准**：
- 阅读体验：节奏拖沓、场景跳跃、衔接断裂
- 文笔问题：描写冗余、用词不当、语法错误
- 市场反馈：读者差评集中的问题

**处理时效**：4小时内处理

**示例**：
```yaml
- 优先级: P1
  类型: 节奏拖沓
  描述: ch035-ch040打斗场景过于冗长
  建议: 精简战斗描写，控制在800字内

- 优先级: P1
  类型: 文笔优化
  描述: ch060多处描写可以更精炼
  建议: 删除重复形容词

- 优先级: P1
  类型: 读者反馈
  描述: ch055情感铺垫不足
  建议: 增加角色内心描写
```

---

### P2 - 中优（可改进项）

**定义标准**：
- 优化建议：风格统一、伏笔强化、细节打磨
- 可选改进：读者反馈中温和的建议

**处理时效**：24小时内处理（纳入下一批次）

**示例**：
```yaml
- 优先级: P2
  类型: 风格统一
  描述: ch070-ch080对话风格需统一
  建议: 统一方言使用和语气词

- 优先级: P2
  类型: 伏笔强化
  描述: ch045伏笔可在ch090呼应
  建议: 在ch090加入呼应描写

- 优先级: P2
  类型: 轻微优化
  描述: ch101行"它们还在动"改为"瞳孔还在动"
  建议: 精确描写
```

---

### P3 - 低优（记录项）

**定义标准**：
- 未来优化：下一版本考虑
- 版本迭代：纳入大版本修订
- 调研储备：市场调研方向

**处理时效**：72小时内记录

**示例**：
```yaml
- 优先级: P3
  类型: 长期优化
  描述: 建议在修订版中考虑增加配角戏份
  理由: 提升故事丰富度

- 优先级: P3
  类型: 市场调研
  描述: 读者反馈主角出场率偏低
  建议: 考虑增加主角章节
```

