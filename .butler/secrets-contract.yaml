# Platform secrets contracts (G1-13) — merged with .butler/extensions/*/manifest.yaml
version: 1

platform_contracts:
  - id: llm
    title: LLM provider API key
    require_any_env:
      - MINIMAX_API_KEY
      - MINIMAX_CN_API_KEY
      - DEEPSEEK_API_KEY
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
    severity: warn

  - id: wechat-gateway
    title: WeChat iLink token (gateway)
    when_gateway_expected: true
    secrets:
      - env: WECHAT_TOKEN
        alt_envs:
          - WEIXIN_TOKEN
        secrets_yaml_key: WECHAT_TOKEN
        require_in_process_env: true
        sync_hint: "Add WECHAT_TOKEN to project .env (systemd EnvironmentFile)"

  - id: wechat-owner
    title: Owner WeChat chat id (runtime push)
    when_gateway_expected: true
    secrets:
      - env: BUTLER_OWNER_WECHAT_ID
        alt_envs:
          - WECHAT_ALLOWED_USERS
        secrets_yaml_key: BUTLER_OWNER_WECHAT_ID
        require_in_process_env: false
        severity: warn
