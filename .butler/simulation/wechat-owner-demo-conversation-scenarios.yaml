# Owner 真人演示对话 — handler 预演（不经 iLink）
# bash scripts/butler-wechat-owner-sim.sh --manifest wechat-owner-demo-conversation-scenarios.yaml --track owner-demo

title: Owner 真人演示对话
version: "2026-07-09"
default_project: ""

tracks:
  - id: owner-demo
    title: 演示脚本（个人管家 → 灵文1号 → 检索/MCP）
    session_mode: shared
    quick: true
    simulate_wechat_outbound: true
    cleanup_globs:
      - docs/dev-delegate-sim*.md
      - docs/dev-delegate-sim*.py
      - docs/owner-demo-*.md
      - docs/owner-demo-*.py
    setup:
      - /新对话
    cases:
      - name: D01 自我介绍
        user_text: 莎丽，介绍一下你自己
        expect_reply_any: [莎丽, 管家, 委派, Butler, 项目]
        reject_reply_any: [workflow 工具被循环阻塞, 演示试点]
        tier: fast

      - name: D02 项目列表
        user_text: 看下目前都有哪些项目
        expect_reply_any: [普通试点项目, 灵文1号, DemoPilot, LingWen1, 项目]
        reject_reply_any: [演示试点]
        tier: fast

      - name: D03 搜 XingWen 路径
        user_text: 帮我搜一下XingWen项目在哪个路径
        prefer_tools_any: [terminal, search_files, list_directory]
        forbid_tools: [run_workflow]
        expect_reply_any: [XingWen, /home/ailearn/projects, 路径, 找到]
        reject_reply_any: [workflow 工具被循环阻塞, 内容代理已完成, 未找到且未搜索]
        tier: standard
        max_seconds: 90

      - name: D04 切换灵文1号
        user_text: /切换 灵文1号
        expect_reply_any: [灵文1号, 切换]
        tier: fast

      - name: D05 任务列表
        user_text: /项目待办
        expect_reply_any: [待办, 项目, 暂无, 任务, todo]
        tier: fast

      - name: D05b 进行中任务
        user_text: /任务
        expect_reply_any: [任务, task_, 委派, 暂无, 最近]
        tier: fast

      - name: D06 架构分析
        user_text: 分析一下灵文1号的代码架构是否需要改进
        expect_reply_any: [架构, 改进, Butler, 灵文, 建议, 层, 模块]
        reject_reply_any: [workflow 工具被循环阻塞]
        soft: true
        tier: slow
        max_seconds: 180

      - name: D07 待做改进项
        user_text: 看下项目目前都有哪些任务或者改进项待做
        expect_reply_any: [待办, 任务, 改进, roadmap, backlog, 计划, 暂无]
        soft: true
        tier: standard
        max_seconds: 120

      - name: D07b 委派前清上下文
        user_text: /新对话
        expect_reply_any: [清空, 上下文]
        tier: fast

      - name: D07c 委派前重进灵文
        user_text: /切换 灵文1号
        expect_reply_any: [灵文1号, 切换, Lead, 厂长]
        tier: fast

      - name: D08 文档类完善（content）
        user_text: >-
          选一个文档类改进项：请 delegate_task，role 必须是 content（不要用 dev）。
          在 docs 写 {sim_dev_md}，一级标题「Owner演示-文档验收」，正文含日期 {sim_date} 和项目名灵文1号；
          子代理用 write_file，路径相对 workspace 根，不要改其他文件，禁止再 delegate_task
        prefer_tools_any: [delegate_task]
        expect_reply_any: [改进, 委派, 内容, docs, 已, 完成]
        expect_outbound_any: [委派, 完成, 后台]
        verify_files_exist:
          - "docs/{sim_dev_md}"
        verify_file_contains:
          - path: "docs/{sim_dev_md}"
            any: [Owner演示, 灵文1号, "{sim_date}"]
        reject_reply_any: [outside workspace]
        soft: true
        tier: slow
        max_seconds: 420

      - name: D08-dev 代码类完善（dev）
        user_text: >-
          再选一个代码类改进项：请 delegate_task，role 必须是 dev（禁止 content、禁止 run_workflow）。
          在 docs 创建 {sim_dev_py}，合法 Python：def owner_demo_ok(): 换行缩进 return 42；
          写完后 read_file 确认，不要用 terminal，不要改其他文件
        prefer_tools_any: [delegate_task]
        expect_reply_any: [开发, dev, 委派, 代码, 完成, owner_demo, task_, 代理]
        expect_outbound_any: [委派, 完成, 后台, 开发]
        verify_files_exist:
          - "docs/{sim_dev_py}"
        verify_file_contains:
          - path: "docs/{sim_dev_py}"
            any: ["def owner_demo_ok", "return 42"]
        reject_reply_any: [outside workspace, SyntaxError, demo/hello.py]
        soft: true
        tier: slow
        max_seconds: 420

      - name: D08b 清上下文
        user_text: /新对话
        expect_reply_any: [清空, 上下文]
        tier: fast

      - name: D08c 重进灵文
        user_text: /切换 灵文1号
        expect_reply_any: [灵文1号, 切换, Lead, 厂长]
        tier: fast

      - name: D09 GitHub 仓库
        user_text: 看下我的github仓库都有哪些
        prefer_tools_any: [mcp_github]
        expect_reply_any: [GitHub, 仓库, WFXM, repo, XiaZiHunDun]
        reject_reply_any: [japanese-learning, fake-repo, 开发代理未能]
        requires_mcp: true
        soft: true
        tier: standard
        max_seconds: 120

      - name: D10 蚂蚁官网 web_search
        user_text: 搜索一下蚂蚁官网的信息
        prefer_tools_any: [web_search]
        forbid_tools: [mcp_firecrawl_firecrawl_search, delegate_task]
        expect_reply_any: [蚂蚁, ant, 官网, 金融, 支付]
        reject_reply_any: [开发代理未能, 内容代理未能]
        tier: standard
        max_seconds: 120

      - name: D11 firecrawl 蚂蚁官网
        user_text: 用firecrawl搜索一下蚂蚁官网的信息
        prefer_tools_any: [mcp_firecrawl, firecrawl]
        forbid_tools: [delegate_task]
        expect_reply_any: [蚂蚁, ant, 官网, firecrawl, 金融]
        reject_reply_any: [开发代理未能, Terminal command is not in the allowlist]
        requires_mcp: true
        tier: slow
        max_seconds: 180
