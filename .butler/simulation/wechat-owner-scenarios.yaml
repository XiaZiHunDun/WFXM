# WeChat Owner 场景模拟（handler，不经 iLink）
# 运行: bash scripts/butler-wechat-owner-sim.sh [--quick] [--track core,...]
# SSOT 对照: docs/guides/wechat-core-scenario.md · wechat-daily-smoke-checklist.md

title: WeChat Owner Scenario Sim
version: "2026-06-22"
default_project: 灵文1号
verify_phrases:
  - "bash scripts/butler-wechat-owner-sim.sh --quick"
  - "bash scripts/butler-wechat-owner-sim.sh --track core,memory,slash"

tracks:
  - id: core
    title: 核心路径（管家 / 切换 / 读项目 / 诊断）
    session_mode: shared
    quick: true
    cases:
      - name: 步骤1 /状态
        user_text: /状态
        expect_reply_any: [项目, Butler, 管家, Provider, 当前]
        tier: fast
      - name: 步骤2 /切换项目
        user_text: /切换 灵文1号
        expect_reply_any: [灵文1号, 切换, 项目]
        tier: fast
      - name: 步骤2b /状态确认项目
        user_text: /状态
        expect_reply_any: [灵文1号]
        tier: fast
      - name: 步骤3 读 project.yaml
        user_text: 请读取当前项目 project.yaml 的前 15 行，用纯文字摘要，必须包含 name 字段的值
        expect_reply_any: [灵文]
        reject_reply_any: [/nonexistent/, 无法访问]
        prefer_tools_any: [read_file]
        tier: standard
      - name: 步骤6 /诊断
        user_text: /诊断
        expect_reply_any: [简要诊断, 健康概览]
        reject_reply_any: [Butler 诊断]
        tier: fast

  - id: slash
    title: 斜杠与运维（无 LLM 或轻量）
    session_mode: shared
    quick: true
    setup:
      - /切换 灵文1号
    cases:
      - name: /项目 列表
        user_text: /项目
        expect_reply_any: [项目, 灵文]
        tier: fast
      - name: /工作流 list
        user_text: /工作流 list
        expect_reply_any: [工作流, novel-factory, 列表]
        tier: fast
      - name: /简报
        user_text: /简报
        expect_reply_any: [简报, 待办, 队列, 门控]
        tier: standard
      - name: /help
        user_text: /help
        expect_reply_any: [/切换, /状态, 常用]
        tier: fast

  - id: owner-ux
    title: Owner 体验 P0–P2（斜杠模拟，无 LLM）
    session_mode: shared
    quick: true
    setup:
      - /切换 演示试点
    cases:
      - name: Tier1 /帮助
        user_text: /帮助
        expect_reply_any: [/状态, /简报, /今日, Lead]
        tier: fast
      - name: /高级 全量索引
        user_text: /高级
        expect_reply_any: [全部, 主题, /帮助]
        tier: fast
      - name: /今日 优先事项
        user_text: /今日
        expect_reply_any: [今日, 优先事项, 健康概览]
        tier: fast
      - name: /简报 含健康灯
        user_text: /简报
        expect_reply_any: [简报, 健康概览, 待办, 队列, 门控]
        tier: fast
      - name: /分工 CC 说明
        user_text: /分工
        expect_reply_any: [Claude Code, 委派, CC]
        tier: fast
      - name: /诊断 Owner 简要
        user_text: /诊断
        expect_reply_any: [简要诊断, 健康概览, /诊断 详细]
        reject_reply_any: [Butler 诊断]
        tier: fast
      - name: /诊断 详细 运维
        user_text: /诊断 详细
        expect_reply_any: [Butler 诊断, 会话, 附件]
        tier: fast
      - name: /项目概况 Owner
        user_text: /项目概况
        expect_reply_any: [项目概况, 今日焦点, 演示试点]
        reject_reply_any: ["📁 文件"]
        tier: fast
      - name: /项目概况 详细
        user_text: /项目概况 详细
        expect_reply_any: [项目概况, 文件, Git]
        tier: fast
      - name: /切换 附摘要
        user_text: /切换 灵文1号
        expect_reply_any: [项目摘要, 灵文1号]
        tier: fast

  - id: attach
    title: 微信附件契约（handler，无 LLM）
    session_mode: fresh
    quick: true
    setup:
      - /切换 演示试点
    cases:
      - name: /诊断 详细 附 txt
        user_text: /诊断 详细
        expect_reply_any: [Butler 诊断, 附件]
        tier: fast

  - id: remote-dev
    title: 远程开发（dev-remote · 沙箱 · CC 桥接）
    session_mode: shared
    quick: true
    setup:
      - /切换 演示试点
    cases:
      - name: /沙箱 诊断
        user_text: /沙箱
        expect_reply_any: [终端沙箱, dev-remote, CC 桥接]
        tier: fast
      - name: /沙箱 策略
        user_text: /沙箱 策略
        expect_reply_any: [项目沙箱策略, sandbox]
        tier: fast
      - name: /cc-bridge 状态
        user_text: /cc-bridge
        expect_reply_any: [CC CLI 桥接, claude, /cc-bridge]
        tier: fast
      - name: /分工 含 CC
        user_text: /分工
        expect_reply_any: [/cc-bridge, 开发代理, Claude Code]
        tier: fast

  - id: memory
    title: 会话重置与项目记忆
    session_mode: shared
    quick: true
    setup:
      - /切换 灵文1号
      - 请记住：本轮测试代号是「紫罗兰-42」，仅用于验收。
    cases:
      - name: 步骤6 /新对话
        user_text: /新对话
        expect_reply_any: [清空, 上下文, 记忆]
        tier: fast
      - name: 步骤6b 不应复述上轮细节
        user_text: 我们刚才聊的测试代号是什么？
        reject_reply_any: [紫罗兰-42]
        soft: true
        prompt_hint: butler/prompts/butler_system.md §会话重置；lingwen_lead_system.md §5
        tier: standard
      - name: 步骤7 项目记忆
        user_text: 当前是什么项目？灵文1号项目是做什么的？
        expect_reply_any: [灵文1号]
        tier: standard

  - id: search
    title: 网络检索路由
    session_mode: fresh
    quick: true
    setup:
      - /切换 灵文1号
    cases:
      - name: 竞品检索
        user_text: 帮我搜一下 AI 写作助手 竞品，列 3 个名字
        forbid_tools: [mcp_firecrawl_firecrawl_search]
        prefer_tools_any: [web_search]
        expect_reply_any: [助手, 写作, AI]
        prompt_hint: butler/prompts/butler_system.md §网络检索与 MCP 路由
        tier: standard
      - name: GitHub 不走 web_fetch
        user_text: 列出我的 GitHub 仓库
        forbid_tools: [web_search, web_fetch]
        prefer_tools_any: [mcp_github_lst-repos-authenticated-usr]
        expect_reply_any: [仓库, GitHub, WFXM]
        prompt_hint: butler/prompts/butler_system.md §网络检索（GitHub→mcp_*）
        tier: standard
        requires_mcp: true

  - id: ext
    title: Extension MCP（Todoist / GitHub / 诊断）
    session_mode: fresh
    quick: false
    requires_mcp: true
    cases:
      - name: EXT-4 GitHub 仓库
        user_text: 列出我的 GitHub 仓库
        expect_reply_any: [WFXM, 仓库]
        reject_reply_any: [japanese-learning, fake-repo]
        tier: standard
      - name: EXT-4 GitHub issues
        user_text: 列出 WFXM 的 issues
        expect_reply_any: [WFXM, issue]
        reject_reply_any: [japanese-learning]
        tier: standard
      - name: EXT-2 Todoist 项目
        user_text: 用 Todoist 列出所有项目
        expect_reply_any: [Todoist, 项目]
        reject_reply_any: [japanese-learning, 示例项目A]
        tier: standard
      - name: /诊断 Extension
        user_text: /诊断 详细
        expect_reply_any: [Extension Verify, github-readonly, Butler 诊断]
        tier: fast

  - id: delegate
    title: 委派（慢，默认跳过 quick）
    session_mode: shared
    quick: false
    cleanup_globs:
      - docs/owner-sim-smoke*.md
    setup:
      - /切换 灵文1号
    cases:
      - name: 步骤4 content 写 docs
        user_text: "请交给内容代理：在 docs 目录写一份 {sim_smoke_file}，标题「微信验收」，正文写今天日期（{sim_date}）和一句说明，不要改其他文件"
        prefer_tools_any: [delegate_task]
        expect_reply_any: [委派, owner-sim-smoke, 内容, 代理]
        verify_files_exist:
          - "docs/{sim_smoke_file}"
        prompt_hint: butler/prompts/butler_system.md §任务委派
        tier: slow
        max_seconds: 480
      - name: 步骤5 dev 只读检查
        user_text: "请委派开发代理：只检查项目 workspace 下 docs/{sim_smoke_file} 是否存在并读前几行，路径不要用 LingWen1/ 前缀，不要改代码"
        prefer_tools_any: [delegate_task]
        expect_reply_any: [已完成, 开发代理, 委派]
        reject_reply_any: [File not found, TOOL_NOT_FOUND]
        prompt_hint: lingwen_lead_system.md §路径；butler_system.md §任务委派 context
        tier: slow
        max_seconds: 180
      - name: 步骤5b /详细 报告
        user_text: /详细
        expect_reply_any: [owner-sim-smoke, 微信验收, 变更, 报告]
        tier: fast
